<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SwitchBot Scheduler</title>
<style>
  :root{
    --bg:#f7f8fa; --panel:#fff; --ink:#1c1e21; --muted:#6b7280;
    --line:#e6e8eb; --accent:#2f6df6; --accent-ink:#fff; --user:#2f6df6; --user-ink:#fff;
    --ok:#178a4c; --err:#c0362c;
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#0f1115; --panel:#181b21; --ink:#e8eaed; --muted:#9aa0a6;
      --line:#262a31; --accent:#5b8cff; --accent-ink:#0f1115; --user:#3b6ff2; --user-ink:#fff; }
  }
  *{box-sizing:border-box}
  body{margin:0;font:16px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg);color:var(--ink);height:100dvh;display:flex;flex-direction:column}
  header{padding:16px 20px;border-bottom:1px solid var(--line);font-weight:600}
  header small{display:block;font-weight:400;color:var(--muted);font-size:13px;margin-top:2px}
  #log{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;
    max-width:760px;width:100%;margin:0 auto}
  .row{display:flex}
  .row.user{justify-content:flex-end}
  .bubble{max-width:80%;padding:12px 15px;border-radius:16px;white-space:pre-wrap;word-wrap:break-word}
  .user .bubble{background:var(--user);color:var(--user-ink);border-bottom-right-radius:5px}
  .bot .bubble{background:var(--panel);border:1px solid var(--line);border-bottom-left-radius:5px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px 16px;max-width:80%}
  .card h4{margin:0 0 8px;font-size:13px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
  .card .line{padding:3px 0;font-variant-numeric:tabular-nums}
  .actions{margin-top:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  button{font:inherit;border:0;border-radius:10px;padding:10px 16px;cursor:pointer}
  .approve{background:var(--accent);color:var(--accent-ink);font-weight:600}
  .approve:disabled{opacity:.5;cursor:default}
  .status.ok{color:var(--ok);font-weight:600}
  .status.err{color:var(--err);font-weight:600}
  form{display:flex;gap:10px;align-items:flex-end;padding:14px 20px;border-top:1px solid var(--line);
    max-width:760px;width:100%;margin:0 auto}
  textarea{flex:1;font:inherit;padding:12px 14px;border:1px solid var(--line);border-radius:12px;
    background:var(--panel);color:var(--ink);resize:none;overflow-y:auto;max-height:180px;line-height:1.45}
  textarea:focus{outline:2px solid var(--accent);outline-offset:0}
  form button{align-self:flex-end;height:46px}
</style>
</head>
<body>
<header>SwitchBot Scheduler<small>Type a schedule in Hebrew or English — you'll approve before anything is written.</small></header>
<div id="log"></div>
<form id="f">
  <textarea id="p" rows="1" dir="auto" autocomplete="off" autofocus
    placeholder="e.g. turn סלון on 6am–5pm every day  (Enter to send · Shift+Enter for a new line)"></textarea>
  <button class="approve" type="submit">Send</button>
</form>
<script>
const log = document.getElementById('log'), form = document.getElementById('f'), input = document.getElementById('p');

function toBottom(){ log.scrollTop = log.scrollHeight; }
function add(el){ log.appendChild(el); toBottom(); return el; }

function grow(){ input.style.height = 'auto'; input.style.height = Math.min(input.scrollHeight, 180) + 'px'; }
input.addEventListener('input', grow);
input.addEventListener('keydown', (e)=>{
  if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); form.requestSubmit(); }
});

function userBubble(text){
  const row = document.createElement('div'); row.className = 'row user';
  const b = document.createElement('div'); b.className = 'bubble'; b.dir = 'auto'; b.textContent = text;
  row.appendChild(b); add(row);
}
function botBubble(text, cls){
  const row = document.createElement('div'); row.className = 'row bot';
  const b = document.createElement('div'); b.className = 'bubble'; b.dir = 'auto';
  if(cls) b.classList.add('status', cls);
  b.textContent = text; row.appendChild(b); return add(row);
}

function readbackCard(readback, schedule){
  const row = document.createElement('div'); row.className = 'row bot';
  const card = document.createElement('div'); card.className = 'card';
  const h = document.createElement('h4'); h.textContent = "Here is what I understood"; card.appendChild(h);
  readback.split('\n').forEach((line)=>{
    const d = document.createElement('div'); d.className = 'line'; d.dir = 'auto'; d.textContent = line; card.appendChild(d);
  });
  const actions = document.createElement('div'); actions.className = 'actions';
  const approve = document.createElement('button'); approve.className = 'approve'; approve.textContent = 'Approve & write';
  const hint = document.createElement('span'); hint.style.color = 'var(--muted)';
  hint.textContent = '…or just type a correction';
  actions.appendChild(approve); actions.appendChild(hint); card.appendChild(actions);
  row.appendChild(card); add(row);

  approve.onclick = async ()=>{
    approve.disabled = true; approve.textContent = 'Writing…';
    try{
      const r = await fetch('/apply', {method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({schedule})});
      const data = await r.json();
      if(data.ok){ botBubble('✅ Written to ' + data.written.join(', '), 'ok'); }
      else { botBubble('⚠️ ' + data.error, 'err'); approve.disabled = false; approve.textContent = 'Approve & write'; }
    }catch(err){ botBubble('⚠️ ' + err, 'err'); approve.disabled = false; approve.textContent = 'Approve & write'; }
  };
}

form.onsubmit = async (e)=>{
  e.preventDefault();
  const prompt = input.value.trim(); if(!prompt) return;
  input.value = ''; grow(); userBubble(prompt);
  const thinking = botBubble('…');
  try{
    const r = await fetch('/preview', {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({prompt})});
    const data = await r.json(); thinking.remove();
    if(data.ok){ readbackCard(data.readback, data.schedule); }
    else { botBubble('⚠️ ' + data.error, 'err'); }
  }catch(err){ thinking.remove(); botBubble('⚠️ ' + err, 'err'); }
};
</script>
</body>
</html>
